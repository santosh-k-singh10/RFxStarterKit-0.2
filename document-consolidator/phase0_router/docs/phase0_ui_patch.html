<!--
  phase0_ui_patch.html
  =====================
  Drop-in replacement for the single-file upload section in rfp_requirement_enricher.html.

  WHAT CHANGES:
  - File input now accepts multiple files (any supported type)
  - Calls Phase 0 endpoint first (/phase0/analyze)
  - Extracts phase1 chunks from document_context
  - Passes them as the input to the existing Phase 1 enrichment flow
  - Shows conflict warnings if Phase 0 detected any
  - Shows per-document classification summary

  HOW TO INTEGRATE:
  1. Replace your existing <input type="file"> block with the markup below
  2. Replace your existing uploadAndAnalyze() function with the one below
  3. Keep all other Phase 1 UI code unchanged — it receives the same text input,
     just now sourced from document_context.phase_contexts.phase1 chunks
-->

<!-- ── UPLOAD SECTION (replace existing) ─────────────────────────── -->
<div class="upload-section" id="uploadSection">
  <div class="upload-area" id="dropZone">
    <div class="upload-icon">📂</div>
    <h3>Upload RFP Pack</h3>
    <p>Drop multiple files or click to browse</p>
    <p class="upload-hint">Supported: PDF, DOCX, XLSX, TXT — select all documents in the pack</p>
    <input
      type="file"
      id="rfpFileInput"
      accept=".pdf,.docx,.txt,.md,.xlsx,.csv"
      multiple
      style="display:none"
    />
    <button class="btn-secondary" onclick="document.getElementById('rfpFileInput').click()">
      Choose Files
    </button>
  </div>

  <!-- Selected files preview -->
  <div id="fileList" style="display:none; margin-top:12px;">
    <h4>Selected Files</h4>
    <ul id="fileListItems" style="list-style:none; padding:0;"></ul>
  </div>

  <!-- Phase 0 classification summary (shown after analysis) -->
  <div id="phase0Summary" style="display:none; margin-top:16px;" class="summary-card">
    <h4>Document Classification</h4>
    <table id="classificationTable" style="width:100%; border-collapse:collapse;">
      <thead>
        <tr>
          <th>File</th><th>Type</th><th>Confidence</th><th>Chunks</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="classificationBody"></tbody>
    </table>
  </div>

  <!-- Conflict warnings -->
  <div id="conflictWarnings" style="display:none; margin-top:12px;" class="warning-card">
    <h4>⚠️ Cross-document Conflicts Detected</h4>
    <ul id="conflictList"></ul>
  </div>

  <button
    id="analyzeBtn"
    class="btn-primary"
    onclick="uploadAndAnalyze()"
    style="margin-top:16px;"
    disabled
  >
    Analyze RFP Pack
  </button>
</div>


<!-- ── JAVASCRIPT (replace / merge with existing upload logic) ────── -->
<script>
// ── Config ────────────────────────────────────────────────────────────────
const PHASE0_ENDPOINT = 'http://localhost:8001/phase0/analyze';
// Your existing Phase 1 endpoint — unchanged
const PHASE1_ENDPOINT = 'http://localhost:8000/analyze';

// ── File input wiring ─────────────────────────────────────────────────────
document.getElementById('rfpFileInput').addEventListener('change', function () {
  const files = Array.from(this.files);
  const listEl = document.getElementById('fileListItems');
  listEl.innerHTML = '';

  files.forEach(f => {
    const li = document.createElement('li');
    li.textContent = `📄 ${f.name} (${(f.size / 1024).toFixed(1)} KB)`;
    listEl.appendChild(li);
  });

  document.getElementById('fileList').style.display = files.length ? 'block' : 'none';
  document.getElementById('analyzeBtn').disabled = files.length === 0;
});

// ── Main upload + analyze flow ────────────────────────────────────────────
async function uploadAndAnalyze() {
  const fileInput = document.getElementById('rfpFileInput');
  const files = Array.from(fileInput.files);
  if (!files.length) return;

  setStatus('Running Phase 0 — classifying documents…');
  showLoader(true);

  try {
    // ── Step 1: Phase 0 ───────────────────────────────────────────────────
    const formData = new FormData();
    files.forEach(f => formData.append('documents', f));

    const phase0Res = await fetch(PHASE0_ENDPOINT, {
      method: 'POST',
      body: formData,
    });

    if (!phase0Res.ok) {
      const err = await phase0Res.json();
      throw new Error(err.detail || 'Phase 0 failed');
    }

    const phase0Data = await phase0Res.json();
    const docContext = phase0Data.document_context;

    // ── Step 2: Render classification summary ─────────────────────────────
    renderClassificationSummary(docContext);

    // ── Step 3: Show conflicts if any ─────────────────────────────────────
    if (docContext.conflicts && docContext.conflicts.length > 0) {
      renderConflicts(docContext.conflicts);
    }

    // ── Step 4: Build Phase 1 input from phase1 chunks ───────────────────
    const phase1Chunks = docContext.phase_contexts?.phase1?.chunks || [];
    if (!phase1Chunks.length) {
      throw new Error('Phase 0 produced no Phase 1 relevant chunks. Check document types.');
    }

    // Combine chunk content into annotated text for Phase 1
    // Each chunk is prefixed with its source for traceability
    const combinedText = phase1Chunks.map(chunk =>
      `[SOURCE: ${chunk.source_document} | ${chunk.page_ref} | ${chunk.section_type}]\n${chunk.content}`
    ).join('\n\n---\n\n');

    setStatus('Phase 0 complete. Running Phase 1 — extracting requirements…');

    // ── Step 5: Call existing Phase 1 endpoint ────────────────────────────
    const phase1Res = await fetch(PHASE1_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        document_text: combinedText,
        rfp_id: docContext.rfp_id,
        // Pass metadata for traceability
        source_documents: docContext.documents.map(d => d.filename),
      }),
    });

    if (!phase1Res.ok) {
      const err = await phase1Res.json();
      throw new Error(err.detail || 'Phase 1 failed');
    }

    const phase1Data = await phase1Res.json();

    // ── Step 6: Render Phase 1 results (your existing render function) ────
    renderResults(phase1Data);
    setStatus(`✅ Analysis complete — ${phase1Chunks.length} chunks processed from ${files.length} document(s)`);

  } catch (err) {
    setStatus(`❌ Error: ${err.message}`);
    console.error(err);
  } finally {
    showLoader(false);
  }
}

// ── Render helpers ────────────────────────────────────────────────────────

function renderClassificationSummary(docContext) {
  const tbody = document.getElementById('classificationBody');
  tbody.innerHTML = '';

  const chunksByDoc = {};
  Object.values(docContext.phase_contexts).forEach(ctx => {
    ctx.chunks.forEach(chunk => {
      chunksByDoc[chunk.source_document] = (chunksByDoc[chunk.source_document] || 0) + 1;
    });
  });

  docContext.documents.forEach(doc => {
    const tr = document.createElement('tr');
    const reviewBadge = doc.needs_review
      ? '<span style="color:#e65c00">⚠ Review</span>'
      : '<span style="color:#2e7d32">✓ OK</span>';

    tr.innerHTML = `
      <td>${doc.filename}</td>
      <td><code>${doc.doc_type}</code></td>
      <td>${(doc.confidence * 100).toFixed(0)}%</td>
      <td>${chunksByDoc[doc.filename] || 0}</td>
      <td>${reviewBadge}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('phase0Summary').style.display = 'block';
}

function renderConflicts(conflicts) {
  const list = document.getElementById('conflictList');
  list.innerHTML = '';

  conflicts.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `
      <strong>[${c.severity.toUpperCase()}]</strong> ${c.description}
      <br><small>Between: ${c.source_documents.join(' ↔ ')}</small>
    `;
    list.appendChild(li);
  });

  document.getElementById('conflictWarnings').style.display = 'block';
}

function setStatus(msg) {
  const el = document.getElementById('statusMessage');
  if (el) el.textContent = msg;
}

function showLoader(show) {
  const el = document.getElementById('loader');
  if (el) el.style.display = show ? 'block' : 'none';
}
</script>
