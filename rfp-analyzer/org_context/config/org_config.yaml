# Default Organization Context Configuration
# ==========================================
# This is a working default configuration for RFP Analyzer.
# Customize this file for your organization's specific needs.

name: "IBM Consulting"
industry: "Consulting"
description: "Sample organization configuration for RFP analysis demonstration"

tech_stack:
  preferred_languages:
    - Python
    - TypeScript
    - Java
  
  cloud_providers:
    - AWS
    - Azure
  
  databases:
    - PostgreSQL
    - MongoDB
  
  frameworks:
    - FastAPI
    - React
    - Django
  
  architecture_patterns:
    - Microservices
    - RESTful APIs
    - Event-Driven

compliance:
  frameworks:
    - GDPR
    - SOC2
  
  certifications:
    - "ISO 27001"
  
  standards:
    - "OWASP Top 10"

naming_conventions:
  requirement_prefix: "REQ"
  functional_prefix: "IBM-FR"
  non_functional_prefix: "NFR"
  compliance_prefix: "CR"
  ambiguity_prefix: "AMB"
  risk_prefix: "RISK"
  separator: "-"
  padding: 3

priority_mapping:
  must_keywords:
    - "shall"
    - "must"
    - "required"
    - "mandatory"
  
  should_keywords:
    - "should"
    - "recommended"
    - "preferred"
  
  could_keywords:
    - "may"
    - "could"
    - "optional"
  
  wont_keywords:
    - "will not"
    - "won't"
    - "excluded"

risk_thresholds:
  high_complexity_indicators:
    - "AI/ML"
    - "machine learning"
    - "blockchain"
    - "real-time"
    - "distributed system"
  
  timeline_red_flags:
    - "< 3 months"
    - "immediate"
    - "urgent"
    - "ASAP"
  
  resource_constraints:
    - "limited budget"
    - "small team"
  
  high_risk_score_threshold: 0.7

output_preferences:
  include_cost_estimates: true
  include_timeline_estimates: true
  include_team_sizing: true
  
  custom_sections:
    - "Technical Approach"
    - "Team Composition"
    - "Risk Mitigation Strategy"
  
  branding:
    primary_color: "#0066CC"
    secondary_color: "#FF6600"

domain_knowledge:
  industry_terms:
    "SLA": "Service Level Agreement"
    "API": "Application Programming Interface"
  
  acronyms:
    "CI/CD": "Continuous Integration/Continuous Deployment"
    "SSO": "Single Sign-On"
  
  vendor_preferences:
    - "AWS"
    - "Azure"
  
  technology_glossary:
    "Kubernetes": "Container orchestration platform"
    "Docker": "Containerization platform"

