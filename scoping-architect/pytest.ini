[pytest]
# Pytest configuration for RFP Analyzer

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    integration: marks tests that require external services
    slow: marks tests that take >5 seconds
    api: marks tests that test API endpoints

# Coverage options (if pytest-cov is installed)
# addopts = --cov=architecture_designer --cov=router --cov-report=html --cov-report=term

# Asyncio configuration
asyncio_mode = auto

