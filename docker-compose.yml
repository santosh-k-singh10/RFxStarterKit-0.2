# Docker Compose configuration for RFxStarterKit
version: '3.8'

services:
  rfp-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.rfp-analyzer
    container_name: rfx-rfp-analyzer
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://servicesessentials.ibm.com/apis/v3}
      - MODEL_ID=${MODEL_ID:-global/anthropic.claude-sonnet-4-5-20250929-v1:0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./sample-rfps:/app/sample-rfps:ro
    restart: unless-stopped
    networks:
      - rfx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  rfx-network:
    driver: bridge
